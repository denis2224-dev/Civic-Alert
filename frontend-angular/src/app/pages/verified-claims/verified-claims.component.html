<section class="panel">
  <div class="header">
    <h1>Verified Corrections</h1>
    <div>
      <label for="category">Filter by category</label>
      <select id="category" [(ngModel)]="selectedCategory" (change)="applyFilter()">
        <option value="all">All</option>
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </div>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="claims">
    <article class="claim-card" *ngFor="let claim of filteredClaims">
      <h2>{{ claim.category }}</h2>
      <p><strong>Claim:</strong> {{ claim.claimText }}</p>
      <p><strong>Status:</strong> {{ claim.status }}</p>
      <p *ngIf="claim.correctionText"><strong>Correction:</strong> {{ claim.correctionText }}</p>
      <p *ngIf="claim.officialSource">
        <strong>Official Source:</strong>
        <a *ngIf="claim.officialSourceUrl" [href]="claim.officialSourceUrl" target="_blank" rel="noreferrer">
          {{ claim.officialSource }}
        </a>
        <span *ngIf="!claim.officialSourceUrl">{{ claim.officialSource }}</span>
      </p>
      <p><strong>Updated:</strong> {{ claim.updatedAt | date: 'medium' }}</p>
    </article>
  </div>
</section>
