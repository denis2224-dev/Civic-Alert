<section class="panel">
  <h1>Track Report Status</h1>
  <label for="tracking">Tracking Code</label>
  <input id="tracking" [(ngModel)]="trackingCode" placeholder="CA-2026-00042" />

  <button type="button" (click)="checkStatus()" [disabled]="loading">
    {{ loading ? 'Checking...' : 'Check Status' }}
  </button>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</section>

<section class="panel result" *ngIf="reportStatus">
  <h2>Status</h2>
  <p><strong>Tracking Code:</strong> {{ reportStatus.trackingCode }}</p>
  <p><strong>Status:</strong> {{ reportStatus.status }}</p>
  <p><strong>Category:</strong> {{ reportStatus.category || 'N/A' }}</p>
  <p><strong>Risk Level:</strong> {{ reportStatus.riskLevel || 'N/A' }}</p>
  <p><strong>Risk Score:</strong> {{ reportStatus.riskScore ?? 'N/A' }}</p>
</section>
