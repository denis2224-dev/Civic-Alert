<div class="shell">
  <header class="topbar">
    <div class="brand">
      <h1>{{ title }}</h1>
      <span>Election rumor checking platform</span>
    </div>

    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Check Claim</a>
      <a routerLink="/report" routerLinkActive="active">Report</a>
      <a routerLink="/verified-claims" routerLinkActive="active">Verified Claims</a>
      <a routerLink="/official-info" routerLinkActive="active">Official Info</a>
      <a routerLink="/report-status" routerLinkActive="active">Track Status</a>
      <a routerLink="/validator" routerLinkActive="active">Validator</a>
    </nav>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
